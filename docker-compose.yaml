services:
  mongodb_dev:
    image: mongo:7.0
    container_name: sass-mongodb-dev
    ports:
      - "27017:27017"
    volumes:
      - mongo_dev_data:/data/db
    networks:
      - sass_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  mongodb_test:
    image: mongo:7.0
    container_name: sass-mongodb-test
    ports:
      - "27018:27017"
    volumes:
      - mongo_test_data:/data/db
    networks:
      - sass_network

  postgres_dev:
    image: postgres:16-alpine
    container_name: sass-postgres-dev
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: sass
      POSTGRES_PASSWORD: sass
      POSTGRES_DB: sass_dev
    volumes:
      - pg_dev_data:/var/lib/postgresql/data
    networks:
      - sass_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sass -d sass_dev"]
      interval: 5s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  postgres_test:
    image: postgres:16-alpine
    container_name: sass-postgres-test
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: sass
      POSTGRES_PASSWORD: sass
      POSTGRES_DB: sass_test
    networks:
      - sass_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sass -d sass_test"]
      interval: 5s
      timeout: 5s
      retries: 3

  app_dev:
    build:
      context: .
      target: development
    container_name: sass-app-dev
    env_file:
      - .env.development
    ports:
      - "5000:5000"
    volumes:
      - .:/usr/src/app:z
      - /usr/src/app/node_modules
    command: ["npm", "run", "dev"]
    depends_on:
      mongodb_dev:
        condition: service_healthy
      postgres_dev:
        condition: service_healthy
    networks:
      - sass_network

  app_test:
    build:
      context: .
      target: development
    container_name: sass-app-test
    env_file:
      - .env.test
    volumes:
      - .:/usr/src/app:z
      - /usr/src/app/node_modules
    depends_on:
      - mongodb_test
      - postgres_test
    networks:
      - sass_network
    command: ["npm", "run", "test"]

networks:
  sass_network:
    driver: bridge

volumes:
  mongo_dev_data:
  mongo_test_data:
  pg_dev_data:
